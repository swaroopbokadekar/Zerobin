<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Register • ZeroBin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-r from-blue-100 via-green-100 to-green-200">

  <!-- ✅ Navbar -->
  <header class="p-6 bg-white/60 backdrop-blur-md">
    <div class="max-w-6xl mx-auto flex items-center justify-between">
      <div class="text-2xl font-extrabold text-green-700">ZeroBin</div>
      <nav id="navbar" class="space-x-4"></nav>
    </div>
  </header>

  <!-- ✅ Register Form -->
  <main class="flex items-center justify-center py-12">
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-green-700 mb-4 text-center">Create your ZeroBin account</h2>
      <form id="form" class="space-y-4">
        <div>
          <label class="text-sm text-gray-600">Name</label>
          <input name="name" required class="w-full mt-1 p-3 border rounded-lg"/>
        </div>
        <div>
          <label class="text-sm text-gray-600">Email</label>
          <input name="email" type="email" required class="w-full mt-1 p-3 border rounded-lg"/>
        </div>
        <div>
          <label class="text-sm text-gray-600">Password</label>
          <input name="password" type="password" required class="w-full mt-1 p-3 border rounded-lg"/>
        </div>
        <div>
          <label class="text-sm text-gray-600">Role</label>
          <select name="role" class="w-full mt-1 p-3 border rounded-lg">
            <option value="donor">Donor</option>
            <option value="ngo">NGO</option>
          </select>
        </div>
        <button class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg transition">Register</button>
      </form>
      <p class="text-center text-gray-600 mt-3">
        Already a member?
        <a href="login.html" class="text-green-700 font-semibold hover:underline">Login</a>
      </p>
    </div>
  </main>

  <script>
    // 🔹 Navbar Renderer
    function renderNavbar() {
      const navbar = document.getElementById("navbar");
      const token = localStorage.getItem("zb_token");
      const role = localStorage.getItem("zb_role");
      const name = localStorage.getItem("zb_name");

      if (token) {
        let links = `
          <span class="text-green-700 font-semibold">Welcome, ${name || "User"}</span>
          <a href="index.html" class="text-gray-700 hover:underline">Home</a>
          <a href="dashboard.html" class="text-gray-700 hover:underline">Dashboard</a>
        `;
        if (role === "donor") {
          links += `<a href="donate.html" class="text-gray-700 hover:underline">Donate</a>`;
        } else if (role === "ngo") {
          links += `<a href="pickups.html" class="text-gray-700 hover:underline">Pickups</a>`;
        }
        links += `<a href="#" id="logoutBtn" class="text-red-600 hover:underline">Logout</a>`;
        navbar.innerHTML = links;
      } else {
        navbar.innerHTML = `
          <a href="index.html" class="text-gray-700 hover:underline">Home</a>
          <a href="register.html" class="text-gray-700 hover:underline">Register</a>
          <a href="login.html" class="text-gray-700 hover:underline">Login</a>
        `;
      }

      const logoutBtn = document.getElementById("logoutBtn");
      if (logoutBtn) {
        logoutBtn.addEventListener("click", (e) => {
          e.preventDefault();
          localStorage.removeItem("zb_token");
          localStorage.removeItem("zb_role");
          localStorage.removeItem("zb_name");
          alert("You have been logged out.");
          window.location.href = "login.html";
        });
      }
    }

    renderNavbar();

    // 🔹 Register Handler
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const f = e.target;
      const body = {
        name: f.name.value.trim(),
        email: f.email.value.trim(),
        password: f.password.value,
        role: f.role.value
      };

      try {
        const res = await fetch('http://localhost:5000/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();

        if (res.ok) {
          alert('🎉 Registration successful! Please login to continue.');

          // Clear any stored token info (if any)
          localStorage.removeItem('zb_token');
          localStorage.removeItem('zb_role');
          localStorage.removeItem('zb_name');

          // Redirect after success
          window.location.href = 'login.html';
        } else {
          alert(data.message || 'Registration failed. Try again.');
        }
      } catch (err) {
        console.error(err);
        alert('⚠️ Server error. Please try again later.');
      }
    });
  </script>
</body>
</html>
