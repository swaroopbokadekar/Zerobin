<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Login • ZeroBin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-r from-green-100 via-blue-100 to-blue-200">
  <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md">
    <h2 class="text-2xl font-bold text-green-700 mb-4 text-center">Login to ZeroBin</h2>
    <form id="form" class="space-y-4">
      <div>
        <label class="text-sm text-gray-600">Email</label>
        <input name="email" type="email" required class="w-full mt-1 p-3 border rounded-lg"/>
      </div>
      <div>
        <label class="text-sm text-gray-600">Password</label>
        <input name="password" type="password" required class="w-full mt-1 p-3 border rounded-lg"/>
      </div>
      <button class="w-full bg-green-600 text-white py-3 rounded-lg">Login</button>
    </form>
    <p class="text-center text-gray-600 mt-3">Don’t have an account? 
      <a href="register.html" class="text-green-700 font-semibold">Register</a>
    </p>
  </div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e)=>{
      e.preventDefault();
      const f = e.target;
      const body = { email: f.email.value, password: f.password.value };

      try {
        const res = await fetch('http://localhost:5000/api/auth/login',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify(body)
        });

        const data = await res.json();

        if(res.ok){
          // 🔹 Save token, role & name
          localStorage.setItem('zb_token', data.token);
          localStorage.setItem('zb_role', data.user.role);
          localStorage.setItem('zb_name', data.user.name);

          alert('✅ Login successful');

          // Redirect: donors → donate, NGOs → find donations
          if(data.user.role === "donor"){
            location.href = "donate.html";
          } else if(data.user.role === "ngo"){
            location.href = "find.html";
          }
        } else {
          alert(data.error || '❌ Invalid credentials');
        }
      } catch (err) {
        alert("⚠️ Server error. Try again later.");
      }
    });
  </script>
</body>
</html>
